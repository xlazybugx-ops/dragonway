<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Драконис · Аркадный бой (прототип, классы)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#0d0b1a;font-family:-apple-system,system-ui,sans-serif;touch-action:none;color:#fff}
  #cv{display:block;position:absolute;inset:0}
  .hud{position:absolute;pointer-events:none;text-shadow:0 1px 3px #000}
  #topbar{top:0;left:0;right:0;padding:10px 14px}
  #barWrap{max-width:340px}
  .bar{height:15px;border-radius:8px;background:rgba(0,0,0,.45);overflow:hidden;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);position:relative}
  .bar>i{display:block;height:100%;width:100%;transition:width .12s linear}
  #hpFill{background:linear-gradient(90deg,#ff5d52,#ff8a3d)}
  #shFill{position:absolute;top:0;left:0;height:100%;background:rgba(180,220,255,.55);width:0}
  #manaFill{background:linear-gradient(90deg,#3d9bff,#7cd6ff)}
  .barlab{font-size:11px;font-weight:700;letter-spacing:.5px;opacity:.85;margin:5px 0 2px}
  #clsTag{font-size:12px;font-weight:700;opacity:.9;margin-bottom:4px}
  #hint{top:78px;left:0;right:0;text-align:center;font-size:12px;opacity:.65}
  /* панель способностей (генерится из лоадаута) */
  #abilities{position:absolute;right:14px;bottom:24px;display:flex;flex-direction:column;gap:10px;pointer-events:auto}
  .ab{width:60px;height:60px;border-radius:15px;position:relative;border:2px solid rgba(255,255,255,.22);
      background:rgba(30,26,58,.85);display:flex;align-items:center;justify-content:center;font-size:26px;
      box-shadow:0 4px 12px rgba(0,0,0,.4);overflow:hidden}
  .ab:active{transform:scale(.93)}
  .ab .cd{position:absolute;inset:0;background:rgba(8,6,20,.72);transform-origin:bottom;transform:scaleY(0);pointer-events:none}
  .ab .nm{position:absolute;bottom:1px;left:0;right:0;text-align:center;font-size:8px;font-weight:700;opacity:.7}
  .ab.dash{border-color:rgba(255,240,180,.5);background:rgba(70,60,30,.8)}
  .ab.nomana{filter:grayscale(.7) brightness(.7)}
  #stick{position:absolute;width:120px;height:120px;border-radius:50%;border:2px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.05);display:none;pointer-events:none}
  #knob{position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px 0 0 -26px;border-radius:50%;
      background:rgba(255,255,255,.35);box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
      gap:16px;background:rgba(8,6,20,.9);text-align:center;pointer-events:auto;padding:24px}
  .screen h1{font-size:26px} .screen p{opacity:.75;font-size:14px;max-width:320px}
  .cls-btn{width:100%;max-width:340px;padding:13px 16px;border:2px solid rgba(255,255,255,.2);border-radius:14px;
      background:rgba(30,26,58,.9);color:#fff;text-align:left;display:flex;gap:12px;align-items:center}
  .cls-btn:active{transform:scale(.97)} .cls-btn .em{font-size:30px}
  .cls-btn b{font-size:15px} .cls-btn small{display:block;opacity:.7;font-size:12px;margin-top:2px}
  .btn-primary{padding:13px 30px;font-size:16px;font-weight:700;border:none;border-radius:14px;
      background:linear-gradient(90deg,#ff8a3d,#ff5d52);color:#fff;box-shadow:0 6px 18px rgba(255,93,82,.4)}
  #overlay{display:none}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="hud" id="topbar">
  <div id="clsTag"></div>
  <div id="barWrap">
    <div class="bar"><i id="hpFill"></i><span id="shFill"></span></div>
    <div class="barlab">💧 МАНА</div>
    <div class="bar"><i id="manaFill"></i></div>
  </div>
</div>
<div class="hud" id="hint">Джойстик — двигаться · Тап по врагу — цель · Кнопки справа — навыки и ⚡Рывок</div>

<div id="stick"><div id="knob"></div></div>
<div id="abilities"></div>

<!-- выбор класса -->
<div class="screen" id="classPick">
  <h1>🐉 Выбери класс</h1>
  <p>Стихия задаёт роль, телосложение — стиль. Пощупай, как по-разному играются.</p>
  <button class="cls-btn" data-cls="pyro"><span class="em">🐲</span><span><b>Пиромант · Вихрь</b><small>Бёрст-стекло: быстрый, поджог, взрывы. Хрупкий — живи уклонениями.</small></span></button>
  <button class="cls-btn" data-cls="frost"><span class="em">🐉</span><span><b>Хладобой · Колосс</b><small>Танк-контролёр: медленный, толстый, щит и заморозка поля.</small></span></button>
  <button class="cls-btn" data-cls="storm"><span class="em">⚡</span><span><b>Грозовик · Вихрь</b><small>Ассасин: рывок-удар, молния, ускорение. Hit-and-run.</small></span></button>
</div>

<!-- конец боя -->
<div class="screen" id="overlay">
  <h1 id="ovTitle"></h1><p id="ovText"></p>
  <button class="btn-primary" id="ovBtn">Сменить класс</button>
</div>

<script>
'use strict';
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(2,devicePixelRatio||1); W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

const WORLD={w:1400,h:1400};
const rand=(a,b)=>a+Math.random()*(b-a);
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// ---------- ТЕЛОСЛОЖЕНИЯ ----------
const PHYS={
  vihr:  {hpMul:0.8, spd:210, atkCd:0.85, dashCd:3, iframe:0.38},
  koloss:{hpMul:1.6, spd:130, atkCd:1.35, dashCd:5, iframe:0.25},
};
// ---------- НАВЫКИ ----------
// kind: melee|proj|ground|self|dash. Эффекты через apply/self.
const SK={
  fireclaw:{name:'Коготь',icon:'🔥',kind:'melee',cd:3,mana:12,range:135,dmg:34, burn:{dps:12,dur:3}},
  lavaspit:{name:'Лава',  icon:'🟠',kind:'proj', cd:6,mana:25,range:360,dmg:60,spd:520},
  heatwave:{name:'Жар',   icon:'🌋',kind:'self', cd:9,mana:30,aoe:130,dmg:40,knock:220},
  iceshard:{name:'Шип',   icon:'🧊',kind:'proj', cd:3.5,mana:14,range:340,dmg:30,spd:460, slow:{mul:0.5,dur:2.5}},
  frostfield:{name:'Поле',icon:'❄️',kind:'ground',cd:10,mana:30,radius:120,dur:5, root:true},
  iceshield:{name:'Щит',  icon:'🛡️',kind:'self', cd:11,mana:28,shield:120,dur:6},
  gust:{name:'Рывок-удар',icon:'💨',kind:'dash', cd:5,mana:16,range:200,dmg:46, iframe:0.4},
  lightning:{name:'Молния',icon:'⚡',kind:'proj', cd:3,mana:16,range:400,dmg:50,spd:900},
  stormspd:{name:'Ускор.',icon:'🏃',kind:'self', cd:12,mana:26,haste:{atk:0.5,spd:1.4,dur:4}},
};
const CLASSES={
  pyro:  {name:'Пиромант · Вихрь', role:'🔥', color:'#f4b942', icon:'🐲', phys:'vihr',
          hp:170, atk:14, loadout:['fireclaw','lavaspit','heatwave']},
  frost: {name:'Хладобой · Колосс', role:'🧊', color:'#6db4d4', icon:'🐉', phys:'koloss',
          hp:150, atk:13, loadout:['iceshard','frostfield','iceshield']},
  storm: {name:'Грозовик · Вихрь', role:'⚡', color:'#b88adf', icon:'⚡', phys:'vihr',
          hp:150, atk:12, loadout:['gust','lightning','stormspd']},
};

let player, enemies, projectiles, zones, floats, particles, cam, state, shake, curClass;

function makePlayer(clsId){
  const c=CLASSES[clsId], ph=PHYS[c.phys];
  return { cls:c, x:WORLD.w/2, y:WORLD.h/2, r:20, speed:ph.spd, baseSpeed:ph.spd,
    hp:c.hp*ph.hpMul, maxHp:c.hp*ph.hpMul, mana:60, maxMana:100, manaRegen:11,
    target:null, globalCd:0, iframe:0, hurtFlash:0, facing:0,
    shield:0, haste:0, hasteAtk:1, hasteSpd:1,
    autoAtk:{cd:ph.atkCd, base:ph.atkCd, t:0, range:150, dmg:c.atk},
    dash:{cd:ph.dashCd, base:ph.dashCd, t:0, iframe:ph.iframe},
    // лоадаут: инстансы навыков + рывок
    kit:c.loadout.map(id=>({id, ...SK[id], _t:0})) };
}
function spawnEnemy(x,y,kind){
  const b={x,y,r:18,hp:120,maxHp:120,speed:78,aggro:320,atkRange:52,atkCd:2.2,t:rand(0,1.5),
    telegraph:0,tele:0.75,dmg:18,dead:false,slow:0,burns:[],flash:0,icon:'👹',color:'#7a4bd0'};
  if(kind==='brute'){b.hp=b.maxHp=220;b.speed=58;b.dmg=32;b.atkRange=66;b.tele=1.0;b.icon='🦖';b.color='#c25b3a';}
  return b;
}
function reset(clsId){
  curClass=clsId; player=makePlayer(clsId);
  enemies=[ spawnEnemy(WORLD.w/2+260,WORLD.h/2-150,'wisp'),
            spawnEnemy(WORLD.w/2-250,WORLD.h/2+170,'wisp'),
            spawnEnemy(WORLD.w/2+140,WORLD.h/2+300,'brute') ];
  projectiles=[]; zones=[]; floats=[]; particles=[]; cam={x:0,y:0}; shake=0; state='play';
  document.getElementById('classPick').style.display='none';
  document.getElementById('overlay').style.display='none';
  document.getElementById('clsTag').textContent=CLASSES[clsId].role+' '+CLASSES[clsId].name;
  buildAbilityBar();
}

// ---------- панель навыков (динамически из kit + рывок) ----------
function buildAbilityBar(){
  const box=document.getElementById('abilities'); box.innerHTML='';
  player.kit.forEach((sk,i)=>{
    const el=document.createElement('div'); el.className='ab';
    el.innerHTML=sk.icon+'<span class="cd"></span><span class="nm">'+sk.name+'</span>';
    const fire=e=>{e.preventDefault();useAbility(i);};
    el.addEventListener('touchstart',fire,{passive:false}); el.addEventListener('mousedown',fire);
    box.appendChild(el);
  });
  const d=document.createElement('div'); d.className='ab dash';
  d.innerHTML='⚡<span class="cd"></span><span class="nm">Рывок</span>';
  const fd=e=>{e.preventDefault();doDash();};
  d.addEventListener('touchstart',fd,{passive:false}); d.addEventListener('mousedown',fd);
  box.appendChild(d);
}

// ---------- джойстик ----------
const joy={active:false,id:null,cx:0,cy:0,dx:0,dy:0,max:52};
const stickEl=document.getElementById('stick'), knobEl=document.getElementById('knob');
function joyStart(x,y,id){ joy.active=true;joy.id=id;joy.cx=x;joy.cy=y;joy.dx=joy.dy=0;
  stickEl.style.display='block';stickEl.style.left=(x-60)+'px';stickEl.style.top=(y-60)+'px';
  knobEl.style.left='50%';knobEl.style.top='50%'; }
function joyMove(x,y){ let vx=x-joy.cx,vy=y-joy.cy;const len=Math.hypot(vx,vy)||1;
  const cl=Math.min(len,joy.max);joy.dx=(vx/len)*(cl/joy.max);joy.dy=(vy/len)*(cl/joy.max);
  knobEl.style.left=(50+joy.dx*40)+'%';knobEl.style.top=(50+joy.dy*40)+'%'; }
function joyEnd(){ joy.active=false;joy.id=null;joy.dx=joy.dy=0;stickEl.style.display='none'; }

function isUI(x,y){ return x>innerWidth-92 && y>innerHeight-320; }
function screenToWorld(sx,sy){ return {x:sx+cam.x,y:sy+cam.y}; }
function selectTarget(sx,sy){ const w=screenToWorld(sx,sy);let best=null,bd=46;
  for(const e of enemies){if(e.dead)continue;const d=Math.hypot(e.x-w.x,e.y-w.y);if(d<bd+e.r){best=e;bd=d;}}
  player.target=best; }
function acquireNearest(mr){ let best=null,bd=mr||Infinity;
  for(const e of enemies){if(e.dead)continue;const d=dist(player,e);if(d<bd){best=e;bd=d;}} return best; }
function pointerDown(x,y,id){ if(state!=='play')return;
  if(x<innerWidth*0.5 && !isUI(x,y)){ if(!joy.active)joyStart(x,y,id); } else selectTarget(x,y); }
cv.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)pointerDown(t.clientX,t.clientY,t.identifier);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===joy.id)joyMove(t.clientX,t.clientY);},{passive:false});
cv.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===joy.id)joyEnd();});
cv.addEventListener('touchcancel',()=>joyEnd());
let mouseDown=false;
cv.addEventListener('mousedown',e=>{mouseDown=true;pointerDown(e.clientX,e.clientY,'m');});
addEventListener('mousemove',e=>{if(mouseDown&&joy.id==='m')joyMove(e.clientX,e.clientY);});
addEventListener('mouseup',()=>{mouseDown=false;if(joy.id==='m')joyEnd();});
const keys=new Set();
addEventListener('keydown',e=>{keys.add(e.code);
  if(e.code==='Digit1')useAbility(0); if(e.code==='Digit2')useAbility(1);
  if(e.code==='Digit3')useAbility(2); if(e.code==='Space'||e.code==='ShiftLeft')doDash();});
addEventListener('keyup',e=>keys.delete(e.code));
document.querySelectorAll('.cls-btn').forEach(b=>b.onclick=()=>reset(b.dataset.cls));
document.getElementById('ovBtn').onclick=()=>{ state='pick';
  document.getElementById('overlay').style.display='none';
  document.getElementById('classPick').style.display='flex'; };

// ---------- движ джойстика (вектор для рывка) ----------
function moveVec(){ let mx=joy.dx,my=joy.dy;
  if(!joy.active){ mx=(keys.has('KeyD')||keys.has('ArrowRight')?1:0)-(keys.has('KeyA')||keys.has('ArrowLeft')?1:0);
    my=(keys.has('KeyS')||keys.has('ArrowDown')?1:0)-(keys.has('KeyW')||keys.has('ArrowUp')?1:0);
    const l=Math.hypot(mx,my);if(l>1){mx/=l;my/=l;} }
  return {mx,my}; }

// ---------- применение навыков ----------
function needTarget(sk){ return sk.kind==='melee'||sk.kind==='proj'||sk.kind==='dash'; }
function useAbility(i){ if(state!=='play')return; const sk=player.kit[i],p=player;
  if(sk._t>0||p.globalCd>0)return;
  if(p.mana<sk.mana){warn('нет маны','#7cd6ff');return;}
  const t=p.target;
  if(needTarget(sk)){ if(!t||t.dead){warn('нет цели','#ffd36b');return;}
    if(dist(p,t)>sk.range){warn('далеко','#ffd36b');return;} }
  p.mana-=sk.mana; sk._t=sk.cd; p.globalCd=0.8;
  if(t)p.facing=Math.atan2(t.y-p.y,t.x-p.x);
  if(sk.kind==='melee'){ hitEnemy(t,sk.dmg,sk); slashFx(p,t); }
  else if(sk.kind==='proj'){ const a=Math.atan2(t.y-p.y,t.x-p.x);
    projectiles.push({x:p.x,y:p.y,vx:Math.cos(a)*sk.spd,vy:Math.sin(a)*sk.spd,r:9,dmg:sk.dmg,sk,life:1.4}); }
  else if(sk.kind==='self'){
    if(sk.shield){ p.shield=sk.shield; p.shieldMax=sk.shield; burst(p.x,p.y,'#bcdcff',16); warn('щит!','#bcdcff'); }
    if(sk.haste){ p.haste=sk.haste.dur; p.hasteAtk=sk.haste.atk; p.hasteSpd=sk.haste.spd; warn('ускорение!','#d8b4ff'); }
    if(sk.aoe){ for(const e of enemies){ if(e.dead)continue; if(dist(p,e)<=sk.aoe){ hitEnemy(e,sk.dmg,sk);
      if(sk.knock){const a=Math.atan2(e.y-p.y,e.x-p.x);e.x+=Math.cos(a)*sk.knock*0.1;e.y+=Math.sin(a)*sk.knock*0.1;} } }
      burst(p.x,p.y,'#ff8a3d',22); shake=Math.min(shake+6,10); }
  }
  else if(sk.kind==='ground'){ zones.push({x:t?t.x:p.x,y:t?t.y:p.y,r:sk.radius,dur:sk.dur,sk}); warn('поле!','#9fe6ff'); }
  else if(sk.kind==='dash'){ const a=Math.atan2(t.y-p.y,t.x-p.x); const d=Math.min(sk.range,dist(p,t));
    p.x=clamp(p.x+Math.cos(a)*d,20,WORLD.w-20); p.y=clamp(p.y+Math.sin(a)*d,20,WORLD.h-20);
    p.iframe=Math.max(p.iframe,sk.iframe); hitEnemy(t,sk.dmg,sk); burst(p.x,p.y,'#d8b4ff',14); }
}
function doDash(){ if(state!=='play')return; const p=player,d=p.dash;
  if(d.t>0)return; let {mx,my}=moveVec();
  if(!mx&&!my){mx=Math.cos(p.facing);my=Math.sin(p.facing);}
  const l=Math.hypot(mx,my)||1; mx/=l;my/=l;
  p.x=clamp(p.x+mx*150,20,WORLD.w-20); p.y=clamp(p.y+my*150,20,WORLD.h-20);
  p.iframe=Math.max(p.iframe,d.iframe); d.t=d.cd; burst(p.x,p.y,'#fff0b4',12); }

function warn(txt,col){ floats.push(mkFloat(player.x,player.y-30,txt,col)); }
function hitEnemy(e,dmg,sk){ if(!e||e.dead)return; const d=Math.round(dmg*rand(0.9,1.1));
  e.hp-=d; e.flash=0.12; burst(e.x,e.y,'#ffca7a',7); shake=Math.min(shake+2,7);
  floats.push(mkFloat(e.x,e.y-e.r-6,d,'#fff'));
  if(sk&&sk.burn) e.burns.push({dps:sk.burn.dps,t:sk.burn.dur});
  if(sk&&sk.slow){ e.slow=Math.max(e.slow,sk.slow.dur); e.slowMul=sk.slow.mul; }
  if(e.hp<=0){ e.dead=true;e.hp=0; burst(e.x,e.y,e.color,22); floats.push(mkFloat(e.x,e.y-10,'✦ 🪙','#ffd36b'));
    if(player.target===e){ player.target=acquireNearest(440);
      if(player.target)floats.push(mkFloat(player.target.x,player.target.y-player.target.r-18,'🎯','#ffd36b')); } }
}
function hitPlayer(dmg){ const p=player; if(p.iframe>0)return;
  if(p.shield>0){ const ab=Math.min(p.shield,dmg); p.shield-=ab; dmg-=ab;
    floats.push(mkFloat(p.x,p.y-p.r-6,'🛡'+ab,'#bcdcff')); if(dmg<=0){p.iframe=0.3;return;} }
  p.hp-=dmg; p.iframe=0.55; p.hurtFlash=0.35; shake=Math.min(shake+5,10);
  burst(p.x,p.y,'#ff5d52',12); floats.push(mkFloat(p.x,p.y-p.r-6,'-'+dmg,'#ff8a8a'));
  if(p.hp<=0){p.hp=0;endGame(false);} }
function mkFloat(x,y,txt,col){return{x,y,txt,col,t:0,life:0.9};}
function burst(x,y,col,n){for(let i=0;i<n;i++){const a=rand(0,6.28),s=rand(40,180);
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.3,.6),t:0,col,r:rand(2,4)});}}
function slashFx(p,t){const a=Math.atan2(t.y-p.y,t.x-p.x);for(let i=0;i<6;i++)
  particles.push({x:p.x+Math.cos(a)*30,y:p.y+Math.sin(a)*30,vx:Math.cos(a)*rand(60,160),vy:Math.sin(a)*rand(60,160),life:.3,t:0,col:'#fff',r:3});}

// ---------- цикл ----------
let last=performance.now();
function frame(now){ const dt=Math.min(0.05,(now-last)/1000); last=now;
  if(state==='play')update(dt); render(); requestAnimationFrame(frame); }
function update(dt){ const p=player;
  const {mx,my}=moveVec(); const spd=p.baseSpeed*(p.haste>0?p.hasteSpd:1);
  p.x=clamp(p.x+mx*spd*dt,20,WORLD.w-20); p.y=clamp(p.y+my*spd*dt,20,WORLD.h-20);
  if(mx||my)p.facing=Math.atan2(my,mx);
  p.mana=Math.min(p.maxMana,p.mana+p.manaRegen*dt);
  p.globalCd=Math.max(0,p.globalCd-dt); p.iframe=Math.max(0,p.iframe-dt); p.hurtFlash=Math.max(0,p.hurtFlash-dt);
  p.haste=Math.max(0,p.haste-dt); p.dash.t=Math.max(0,p.dash.t-dt);
  const atkCd=p.autoAtk.base*(p.haste>0?p.hasteAtk:1); p.autoAtk.t=Math.max(0,p.autoAtk.t-dt);
  for(const sk of p.kit)sk._t=Math.max(0,sk._t-dt);
  // автоатака
  const t=p.target;
  if(t&&!t.dead&&dist(p,t)<=p.autoAtk.range&&p.autoAtk.t<=0){ hitEnemy(t,p.autoAtk.dmg,null);
    p.autoAtk.t=atkCd; p.facing=Math.atan2(t.y-p.y,t.x-p.x); }
  // снаряды
  for(const pr of projectiles){ pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;pr.life-=dt;
    for(const e of enemies){if(e.dead)continue;if(Math.hypot(e.x-pr.x,e.y-pr.y)<e.r+pr.r){hitEnemy(e,pr.dmg,pr.sk);pr.life=0;break;}}}
  projectiles=projectiles.filter(pr=>pr.life>0&&pr.x>-50&&pr.x<WORLD.w+50&&pr.y>-50&&pr.y<WORLD.h+50);
  // зоны (лёд): замедляют/сковывают внутри
  for(const z of zones){ z.dur-=dt;
    for(const e of enemies){if(e.dead)continue;if(dist(z,e)<=z.r){ e.slow=Math.max(e.slow,0.3);
      e.slowMul=z.sk.root?0.08:0.4; }}}
  zones=zones.filter(z=>z.dur>0);
  // враги: статусы + AI
  for(const e of enemies){ if(e.dead)continue; e.flash=Math.max(0,e.flash-dt);
    for(const b of e.burns){ b.t-=dt; e.hp-=b.dps*dt; } e.burns=e.burns.filter(b=>b.t>0);
    if(e.hp<=0&&!e.dead){e.dead=true;burst(e.x,e.y,e.color,20);if(player.target===e)player.target=acquireNearest(440);continue;}
    const em=e.slow>0?(e.slowMul||0.5):1; e.slow=Math.max(0,e.slow-dt);
    const d=dist(e,p);
    if(e.telegraph>0){ e.telegraph-=dt; if(e.telegraph<=0&&dist(e,p)<=e.atkRange+8)hitPlayer(e.dmg); continue; }
    e.t=Math.max(0,e.t-dt);
    if(d<e.aggro){ if(d>e.atkRange){const a=Math.atan2(p.y-e.y,p.x-e.x);e.x+=Math.cos(a)*e.speed*em*dt;e.y+=Math.sin(a)*e.speed*em*dt;}
      else if(e.t<=0){e.telegraph=e.tele;e.t=e.atkCd;} }
  }
  for(const f of floats){f.t+=dt;f.y-=26*dt;} floats=floats.filter(f=>f.t<f.life);
  for(const pt of particles){pt.t+=dt;pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vx*=0.92;pt.vy*=0.92;} particles=particles.filter(pt=>pt.t<pt.life);
  shake*=0.86;
  if(enemies.every(e=>e.dead))endGame(true);
  cam.x=clamp(p.x-W/2,0,Math.max(0,WORLD.w-W)); cam.y=clamp(p.y-H/2,0,Math.max(0,WORLD.h-H));
  updateHUD();
}
function endGame(win){ state='over';
  document.getElementById('ovTitle').textContent=win?'⚔️ Победа!':'💤 Дракон обессилел';
  document.getElementById('ovText').textContent=win
    ?'Все враги повержены. В реальной игре — 🥚 яйцо, 🪙 монеты и возврат в полёт. Попробуй другой класс — стиль сильно меняется.'
    :'В реальной игре дракон отдышится (+25% сил) и полёт продолжится. Попробуй класс потолще или уклоняйся рывком от красных зон.';
  document.getElementById('overlay').style.display='flex';
}

// ---------- отрисовка ----------
function render(){ ctx.clearRect(0,0,W,H);
  const sx=shake?rand(-shake,shake):0, sy=shake?rand(-shake,shake):0;
  ctx.save(); ctx.translate(-cam.x+sx,-cam.y+sy);
  drawGround();
  for(const z of zones){ ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,6.283);
    ctx.fillStyle='rgba(120,200,255,.18)';ctx.fill();ctx.lineWidth=2;ctx.strokeStyle='rgba(150,220,255,.5)';ctx.stroke(); }
  for(const e of enemies){ if(e.dead||e.telegraph<=0)continue; const prog=1-e.telegraph/e.tele;
    ctx.beginPath();ctx.arc(e.x,e.y,e.atkRange,0,6.283);
    ctx.fillStyle=`rgba(255,70,60,${0.12+prog*0.28})`;ctx.fill();
    ctx.lineWidth=3;ctx.strokeStyle=`rgba(255,90,80,${0.4+prog*0.5})`;ctx.stroke(); }
  const t=player.target;
  if(t&&!t.dead){ ctx.beginPath();ctx.arc(t.x,t.y,t.r+10,0,6.283);
    ctx.lineWidth=3;ctx.strokeStyle='#ffd36b';ctx.setLineDash([6,6]);ctx.stroke();ctx.setLineDash([]); }
  for(const pr of projectiles){ ctx.beginPath();ctx.arc(pr.x,pr.y,pr.r,0,6.283);
    ctx.fillStyle='#ff9a3d';ctx.shadowColor='#ff5d52';ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0; }
  for(const e of enemies){ if(e.dead)continue; drawUnit(e.x,e.y,e.r,e.color,e.icon,e.flash>0);
    const bw=44; ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(e.x-bw/2,e.y-e.r-16,bw,5);
    ctx.fillStyle='#ff5d52';ctx.fillRect(e.x-bw/2,e.y-e.r-16,bw*Math.max(0,e.hp/e.maxHp),5);
    if(e.burns.length){ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText('🔥',e.x-10,e.y-e.r-20);}
    if(e.slow>0){ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText('❄️',e.x+10,e.y-e.r-20);} }
  const p=player; const blink=p.iframe>0&&Math.floor(p.iframe*20)%2===0;
  if(!blink){ drawUnit(p.x,p.y,p.r,p.hurtFlash>0?'#ff8a8a':p.cls.color,p.cls.icon,p.hurtFlash>0);
    if(p.shield>0){ctx.beginPath();ctx.arc(p.x,p.y,p.r+7,0,6.283);ctx.lineWidth=3;ctx.strokeStyle='rgba(180,220,255,.8)';ctx.stroke();}
    if(p.haste>0){ctx.beginPath();ctx.arc(p.x,p.y,p.r+11,0,6.283);ctx.lineWidth=2;ctx.strokeStyle='rgba(216,180,255,.7)';ctx.stroke();}
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.facing);
    ctx.beginPath();ctx.moveTo(p.r-2,0);ctx.lineTo(p.r+12,-5);ctx.lineTo(p.r+12,5);ctx.closePath();
    ctx.fillStyle='#ffe08a';ctx.fill();ctx.restore(); }
  for(const pt of particles){ctx.globalAlpha=Math.max(0,1-pt.t/pt.life);ctx.fillStyle=pt.col;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,6.283);ctx.fill();} ctx.globalAlpha=1;
  ctx.textAlign='center';ctx.font='bold 16px system-ui';
  for(const f of floats){ctx.globalAlpha=Math.max(0,1-f.t/f.life);ctx.fillStyle=f.col;
    ctx.strokeStyle='rgba(0,0,0,.6)';ctx.lineWidth=3;ctx.strokeText(f.txt,f.x,f.y);ctx.fillText(f.txt,f.x,f.y);}
  ctx.globalAlpha=1; ctx.restore();
}
function drawGround(){ ctx.fillStyle='#141029';ctx.fillRect(0,0,WORLD.w,WORLD.h);
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  for(let x=0;x<=WORLD.w;x+=70){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,WORLD.h);ctx.stroke();}
  for(let y=0;y<=WORLD.h;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(WORLD.w,y);ctx.stroke();}
  ctx.strokeStyle='rgba(120,90,220,.4)';ctx.lineWidth=4;ctx.strokeRect(4,4,WORLD.w-8,WORLD.h-8); }
function drawUnit(x,y,r,col,icon,flash){
  ctx.beginPath();ctx.ellipse(x,y+r*0.8,r*0.9,r*0.35,0,0,6.283);ctx.fillStyle='rgba(0,0,0,.35)';ctx.fill();
  ctx.beginPath();ctx.arc(x,y,r,0,6.283);ctx.fillStyle=flash?'#fff':col;
  ctx.shadowColor=col;ctx.shadowBlur=flash?20:8;ctx.fill();ctx.shadowBlur=0;
  ctx.font=(r*1.3)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(icon,x,y+1);ctx.textBaseline='alphabetic'; }

function updateHUD(){ const p=player;
  document.getElementById('hpFill').style.width=(p.hp/p.maxHp*100)+'%';
  document.getElementById('shFill').style.width=(Math.min(1,(p.shield||0)/p.maxHp)*100)+'%';
  document.getElementById('manaFill').style.width=(p.mana/p.maxMana*100)+'%';
  const abs=document.querySelectorAll('#abilities .ab');
  p.kit.forEach((sk,i)=>{ const el=abs[i]; if(!el)return;
    el.querySelector('.cd').style.transform='scaleY('+(sk._t/sk.cd)+')';
    el.classList.toggle('nomana',p.mana<sk.mana); });
  const dEl=abs[p.kit.length]; if(dEl)dEl.querySelector('.cd').style.transform='scaleY('+(p.dash.t/p.dash.cd)+')';
}

state='pick';
requestAnimationFrame(t=>{last=t;frame(t);});
</script>
